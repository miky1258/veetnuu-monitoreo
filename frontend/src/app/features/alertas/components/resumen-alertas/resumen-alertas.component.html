<section class="rounded-2xl bg-[#0f2343] p-5">
  <h2 class="text-2xl font-semibold text-slate-100">Resumen de alertas</h2>

  <div class="mt-5 space-y-3">
    <div class="rounded-md bg-[#07162f] px-4 py-4">
      <p class="text-sm text-slate-400">Total de alertas (24h)</p>
      <p class="mt-2 text-3xl font-semibold text-slate-100">
        {{ resumen.totalAlertas24h }}
      </p>
    </div>

    <div class="rounded-md bg-[#07162f] px-4 py-4">
      <p class="text-sm text-slate-400">Tiempo promedio de respuesta</p>
      <p class="mt-2 text-2xl font-semibold text-slate-100">
        {{ resumen.tiempoPromedioRespuesta }}
      </p>
    </div>

    <div class="rounded-md bg-[#07162f] px-4 py-4">
      <p class="text-sm text-slate-400">Tasa de resolución</p>
      <p class="mt-2 text-2xl font-semibold text-amber-300">
        {{ resumen.tasaResolucion }}%
      </p>
    </div>

    <div class="rounded-md bg-[#07162f] px-4 py-6">
      <div class="flex h-24 items-end gap-2">
        <span class="w-8 rounded-t bg-slate-600" style="height: 28px"></span>
        <span class="w-8 rounded-t bg-slate-500" style="height: 40px"></span>
        <span class="w-8 rounded-t bg-slate-700" style="height: 20px"></span>
        <span class="w-8 rounded-t bg-slate-500" style="height: 52px"></span>
        <span class="w-8 rounded-t bg-slate-300" style="height: 68px"></span>
        <span class="w-8 rounded-t bg-slate-500" style="height: 46px"></span>
        <span class="w-8 rounded-t bg-slate-600" style="height: 30px"></span>
      </div>

      <p class="mt-4 text-center text-[10px] font-semibold uppercase tracking-[0.18em] text-slate-500">
        Incidentes por hora
      </p>
    </div>
  </div>
</section>
