<article
  class="cursor-pointer rounded-xl border p-4 transition hover:border-slate-500/40"
  [class]="obtenerClasesTarjeta()"
  (click)="onSeleccionar()"
>
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0">
      <div class="mb-2 flex items-center gap-2">
        <span class="inline-flex h-4 w-4 shrink-0 items-center justify-center">
          @switch (alerta.tipo) {
            @case ('robo') {
              <svg
                viewBox="0 0 24 24"
                class="h-4 w-4 text-red-200"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M12 4L21 20H3L12 4z"></path>
                <path d="M12 9v4"></path>
                <path d="M12 17h.01"></path>
              </svg>
            }
            @case ('accidente') {
              <svg
                viewBox="0 0 24 24"
                class="h-4 w-4 text-amber-300"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M3 16l3-6h12l3 6"></path>
                <circle cx="7.5" cy="17.5" r="1.5"></circle>
                <circle cx="16.5" cy="17.5" r="1.5"></circle>
                <path d="M7 10l1.5-3h7L17 10"></path>
              </svg>
            }
            @case ('medica') {
              <svg
                viewBox="0 0 24 24"
                class="h-4 w-4 text-yellow-300"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
              </svg>
            }
            @case ('alarma') {
              <svg
                viewBox="0 0 24 24"
                class="h-4 w-4 text-rose-200"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M18 8a6 6 0 10-12 0c0 7-3 6-3 8h18c0-2-3-1-3-8"></path>
                <path d="M13.73 21a2 2 0 01-3.46 0"></path>
              </svg>
            }
          }
        </span>

        <h2 class="truncate text-sm font-semibold" [class]="obtenerClasesTitulo()">
          {{ alerta.titulo }}
        </h2>
      </div>

      <p
        class="text-xs leading-5"
        [class.text-red-100/80]="alerta.prioridad === 'alta'"
        [class.text-slate-400]="alerta.prioridad !== 'alta'"
      >
        {{ alerta.descripcion }}
      </p>
    </div>

    <span
      class="shrink-0 text-[10px] font-semibold uppercase tracking-[0.16em]"
      [class.text-red-200/80]="alerta.prioridad === 'alta'"
      [class.text-slate-500]="alerta.prioridad !== 'alta'"
    >
      {{ alerta.tiempo }}
    </span>
  </div>

  @if (alerta.prioridad === 'alta') {
    <div class="mt-4 flex items-center justify-between">
      <div class="h-1.5 w-24 rounded-full bg-white/20">
        <div class="h-1.5 w-20 rounded-full bg-red-300"></div>
      </div>

      <span class="text-[10px] font-semibold uppercase tracking-[0.18em] text-red-200">
        {{ obtenerEtiquetaPrioridad() }}
      </span>
    </div>
  }
</article>
