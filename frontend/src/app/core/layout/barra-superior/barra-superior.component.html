<header class="flex h-16 items-center justify-between border-b border-[#0f274d] bg-[#021630] px-6 text-slate-100">
  <div class="flex min-w-0 items-center gap-6">
    <div class="shrink-0">
      <h2 class="text-[1.05rem] font-semibold tracking-wide text-slate-100">
        {{ nombreSistema }}
      </h2>
    </div>

    <div class="hidden items-center gap-2 md:flex">
      <span class="h-2 w-2 rounded-full bg-emerald-400"></span>
      <span class="text-xs font-medium text-slate-300">
        System Status: {{ estadoSistema }}
      </span>
    </div>

    <div class="hidden md:block">
      <span class="border-b border-white/30 pb-1 text-xs font-semibold text-slate-200">
        {{ totalAlertasActivas }} Active Alerts
      </span>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <button
      type="button"
      class="flex h-10 w-10 items-center justify-center rounded-md border border-transparent text-slate-300 transition hover:bg-white/5 hover:text-white"
      aria-label="Notificaciones"
      title="Notificaciones"
    >
      <svg
        viewBox="0 0 24 24"
        class="h-[18px] w-[18px]"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"></path>
        <path d="M10 21a2 2 0 0 0 4 0"></path>
      </svg>
    </button>

    <button
      type="button"
      class="flex h-10 w-10 items-center justify-center rounded-md border border-transparent text-slate-300 transition hover:bg-white/5 hover:text-white"
      aria-label="Configuración"
      title="Configuración"
    >
      <svg
        viewBox="0 0 24 24"
        class="h-[18px] w-[18px]"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <circle cx="12" cy="12" r="3"></circle>
        <path
          d="M19.4 15a1.6 1.6 0 0 0 .32 1.76l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.6 1.6 0 0 0 15 19.4a1.6 1.6 0 0 0-1 .6 1.6 1.6 0 0 1-2 0 1.6 1.6 0 0 0-1-.6 1.6 1.6 0 0 0-1.76.32l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.6 1.6 0 0 0 4.6 15a1.6 1.6 0 0 0-.6-1 1.6 1.6 0 0 1 0-2 1.6 1.6 0 0 0 .6-1 1.6 1.6 0 0 0-.32-1.76l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.6 1.6 0 0 0 9 4.6a1.6 1.6 0 0 0 1-.6 1.6 1.6 0 0 1 2 0 1.6 1.6 0 0 0 1 .6 1.6 1.6 0 0 0 1.76-.32l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.6 1.6 0 0 0 19.4 9c0 .38.13.74.37 1.03a1.6 1.6 0 0 1 0 1.94c-.24.29-.37.65-.37 1.03z"
        ></path>
      </svg>
    </button>

    <div class="ml-2 hidden text-right sm:block">
      <p class="text-sm font-medium text-slate-200">
        {{ sesionActual()?.nombre || 'Usuario' }}
      </p>
      <p class="text-[11px] uppercase tracking-[0.16em] text-slate-400">
        {{ sesionActual()?.rol || 'Sin rol' }}
      </p>
    </div>

    <button
      type="button"
      class="ml-1 flex h-10 w-10 items-center justify-center overflow-hidden rounded-md border border-white/10 bg-white/5 transition hover:bg-white/10"
      aria-label="Perfil de usuario"
      title="Perfil de usuario"
    >
      <span class="flex h-full w-full items-center justify-center bg-slate-700 text-xs font-semibold text-slate-200">
        {{ inicialesUsuario() }}
      </span>
    </button>
  </div>
</header>
