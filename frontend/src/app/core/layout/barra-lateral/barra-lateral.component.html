<aside class="flex h-full w-64 shrink-0 flex-col border-r border-[#0f274d] bg-[#02122d] text-slate-100">
  <div class="px-5 pb-4 pt-6">
    <div class="flex items-start gap-3">
      <div
        class="flex h-8 w-8 shrink-0 items-center justify-center rounded-md bg-white/10 ring-1 ring-white/10"
      >
        <svg
          viewBox="0 0 24 24"
          class="h-4 w-4 text-slate-200"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M12 3l7 3v6c0 4.5-2.8 7.5-7 9-4.2-1.5-7-4.5-7-9V6l7-3z"></path>
          <path d="M12 8v8"></path>
        </svg>
      </div>

      <div class="min-w-0">
        <h1 class="text-[1.35rem] font-semibold leading-none tracking-wide text-slate-100">
          VE'ETNU'U
        </h1>
        <p class="mt-2 text-[10px] uppercase tracking-[0.28em] text-slate-400">
          Centro de monitoreo
        </p>
      </div>
    </div>
  </div>

  <nav class="px-3 pt-5">
    <ul class="space-y-2">
      @for (item of itemsNavegacion; track item.etiqueta) {
        <li>
          <a
            [routerLink]="item.ruta"
            routerLinkActive="bg-white/8 text-slate-100 shadow-[inset_-2px_0_0_0_rgba(255,255,255,0.75)]"
            [routerLinkActiveOptions]="{ exact: item.ruta !== '/dashboard/alertas' }"
            class="group flex items-center gap-3 rounded-lg px-4 py-3 text-sm font-medium text-slate-400 transition hover:bg-white/5 hover:text-slate-200"
          >
            <span class="flex h-5 w-5 shrink-0 items-center justify-center">
              @switch (item.icono) {
                @case ('inicio') {
                  <svg
                    viewBox="0 0 24 24"
                    class="h-[18px] w-[18px]"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M3 10.5L12 3l9 7.5"></path>
                    <path d="M5 9.5V20h5v-5h4v5h5V9.5"></path>
                  </svg>
                }
                @case ('alertas') {
                  <svg
                    viewBox="0 0 24 24"
                    class="h-[18px] w-[18px]"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M12 4L21 20H3L12 4z"></path>
                    <path d="M12 9v4"></path>
                    <path d="M12 17h.01"></path>
                  </svg>
                }
                @case ('estaciones') {
                  <svg
                    viewBox="0 0 24 24"
                    class="h-[18px] w-[18px]"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M12 3v18"></path>
                    <path d="M7 7h10"></path>
                    <path d="M6 21h12"></path>
                    <path d="M8 11h8"></path>
                    <path d="M9 15h6"></path>
                  </svg>
                }
                @case ('reportes') {
                  <svg
                    viewBox="0 0 24 24"
                    class="h-[18px] w-[18px]"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M5 20V10"></path>
                    <path d="M12 20V4"></path>
                    <path d="M19 20v-7"></path>
                    <path d="M3 20h18"></path>
                  </svg>
                }
                @case ('ajustes') {
                  <svg
                    viewBox="0 0 24 24"
                    class="h-[18px] w-[18px]"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                      d="M19.4 15a1.6 1.6 0 0 0 .32 1.76l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.6 1.6 0 0 0 15 19.4a1.6 1.6 0 0 0-1 .6 1.6 1.6 0 0 1-2 0 1.6 1.6 0 0 0-1-.6 1.6 1.6 0 0 0-1.76.32l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.6 1.6 0 0 0 4.6 15a1.6 1.6 0 0 0-.6-1 1.6 1.6 0 0 1 0-2 1.6 1.6 0 0 0 .6-1 1.6 1.6 0 0 0-.32-1.76l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.6 1.6 0 0 0 9 4.6a1.6 1.6 0 0 0 1-.6 1.6 1.6 0 0 1 2 0 1.6 1.6 0 0 0 1 .6 1.6 1.6 0 0 0 1.76-.32l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.6 1.6 0 0 0 19.4 9c0 .38.13.74.37 1.03a1.6 1.6 0 0 1 0 1.94c-.24.29-.37.65-.37 1.03z"
                    ></path>
                  </svg>
                }
              }
            </span>

            <span>{{ item.etiqueta }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="mt-auto px-4 pb-5">
    <button
      type="button"
      class="mb-5 flex w-full items-center justify-center gap-2 rounded-md bg-[#cf1637] px-4 py-3 text-xs font-semibold uppercase tracking-[0.22em] text-white transition hover:bg-[#b9112e]"
    >
      <span class="text-sm leading-none">+</span>
      <span>New Incident</span>
    </button>

    <div class="border-t border-white/10 pt-4">
      <div class="space-y-1">
        <button
          type="button"
          class="flex w-full items-center gap-3 rounded-md px-3 py-2 text-sm text-slate-400 transition hover:bg-white/5 hover:text-slate-200"
        >
          <svg
            viewBox="0 0 24 24"
            class="h-[16px] w-[16px]"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 2-3 4"></path>
            <path d="M12 17h.01"></path>
          </svg>
          <span>Soporte</span>
        </button>

        <button
          type="button"
          (click)="cerrarSesion()"
          class="flex w-full items-center gap-3 rounded-md px-3 py-2 text-sm text-slate-400 transition hover:bg-white/5 hover:text-slate-200"
        >
          <svg
            viewBox="0 0 24 24"
            class="h-[16px] w-[16px]"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <path d="M16 17l5-5-5-5"></path>
            <path d="M21 12H9"></path>
          </svg>
          <span>Cerrar sesión</span>
        </button>
      </div>
    </div>
  </div>
</aside>
